name: BuildX64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          local-cache: false
          link-to-sdk: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y build-essential tree ninja-build gcc-multilib g++-multilib lib32stdc++-11-dev flex bison ruby ruby-dev python3-requests python3-setuptools python3-dev python3-pip libc6-dev libc6-dev-i386
          python3 -m pip install lief

      - name: build frida (android-x86_64) with Florida patches
        shell: bash
        run: |
          git config --global user.name "ci"
          git config --global user.email "ci@local"
          export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
          FRIDA_TAG=17.8.2
          echo "NDK=$ANDROID_NDK_ROOT  pin frida=$FRIDA_TAG"
          git clone https://github.com/frida/frida
          cd frida
          git checkout ${FRIDA_TAG}
          git submodule update --init --recursive
          echo "frida checkout: $(git describe --tags)"
          echo "frida-core HEAD: $(git -C subprojects/frida-core rev-parse HEAD)"
          for path in ../patches/*; do
            name=$(basename "$path")
            [ -d "subprojects/$name" ] || { echo "skip $name"; continue; }
            echo "=== apply patches to subprojects/$name ==="
            ( cd "subprojects/$name" && git am --3way "../../../patches/$name/"*.patch )
          done
          cd ..
          mkdir build-x64 && cd build-x64
          ../frida/configure --host=android-x86_64
          make
          cd ..
          mkdir -p out
          cp build-x64/subprojects/frida-core/server/frida-server out/florida-server-x86_64
          cp build-x64/subprojects/frida-core/lib/gadget/frida-gadget.so out/florida-gadget-x86_64.so || true
          (cd frida && git describe --tags 2>/dev/null || echo unknown) > out/VERSION
          ls -la out

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: florida-x86_64
          path: out/*
          retention-days: 7
